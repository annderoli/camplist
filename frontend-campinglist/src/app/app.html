<main class="app-container">
  <div class="glass-card">

    <!-- Cabeçalho fixo -->
    <header class="app-header">
      <div class="header-icon">🏕️</div>
      <h1>CampingList</h1>
      <p>Organize sua viagem com estilo</p>
    </header>

    <!-- Tela de carregamento -->
    <div class="loading-state" *ngIf="isLoading()">
      <div class="spinner"></div>
      <p>Sincronizando com o acampamento...</p>
    </div>

    <!-- TELA 1: Gerenciar Itens -->
    <app-manage
      *ngIf="!isLoading() && view() === 'manage'"
      [items]="items()"
      (addItem)="onAddItem($event)"
      (updateItem)="onUpdateItem($event)"
      (deleteItem)="onDeleteItem($event)"
      (goToChecklist)="onGoToChecklist()"
    />

    <!-- TELA 2: Checklist Ativo -->
    <app-checklist
      *ngIf="!isLoading() && view() === 'checklist' && !isFinished()"
      [items]="items()"
      [currentIndex]="currentIndex()"
      (markOk)="onMarkOk()"
      (backToManage)="onBackToManage()"
    />

    <!-- TELA 3: Sucesso -->
    <app-success
      *ngIf="!isLoading() && view() === 'checklist' && isFinished()"
      [items]="items()"
      (backToManage)="onBackToManage()"
    />

  </div>
</main>
