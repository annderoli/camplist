<div class="success-state fade-in">

  <!-- Ícone e título -->
  <div class="success-icon">🎉</div>
  <h2>Mochila Pronta!</h2>
  <p class="success-text">Você separou todos os {{ items().length }} itens com sucesso.</p>

  <!-- Lista final de itens confirmados -->
  <div class="final-list">
    <div class="list-item" *ngFor="let item of items()">
      <span class="check-icon">✅</span>
      <span class="item-name-checked">{{ item.name }}</span>
    </div>
  </div>

  <!-- Botão para voltar ao gerenciamento -->
  <button class="btn-secondary mt-20" (click)="onBackToManage()">
    Revisar ou Adicionar Mais
  </button>

</div>
