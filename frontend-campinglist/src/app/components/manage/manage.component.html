<div class="manage-state fade-in">

  <!-- Formulário de adicionar/editar item -->
  <div class="add-form">
    <input
      type="text"
      [(ngModel)]="newItemName"
      placeholder="Ex: Barraca, Lanterna..."
      class="input-text"
      (keyup.enter)="saveItem()"
    />
    <button class="btn-add" (click)="saveItem()">
      {{ editingItem ? 'Salvar' : 'Adicionar' }}
    </button>
    <button class="btn-cancel" *ngIf="editingItem" (click)="resetForm()">✕</button>
  </div>

  <!-- Lista de itens -->
  <div class="manage-list">
    <div *ngIf="items().length === 0" class="empty-list">
      <p>Sua mochila está vazia.</p>
      <p>Adicione itens acima para começar!</p>
    </div>

    <div class="list-item" *ngFor="let item of items()">
      <div class="item-info">
        <span class="item-name-manage">{{ item.name }}</span>
      </div>
      <div class="item-actions">
        <button class="btn-action edit" (click)="startEdit(item)" title="Editar">✏️</button>
        <button class="btn-action delete" (click)="onDeleteItem(item.id)" title="Excluir">🗑️</button>
      </div>
    </div>
  </div>

  <!-- Botão fixo para ir ao checklist -->
  <div class="fixed-bottom-action" *ngIf="items().length > 0">
    <button class="btn-primary ripple" (click)="onGoToChecklist()">
      <span class="btn-text">Ir para Checklist</span>
      <span class="btn-icon">🚀</span>
    </button>
  </div>

</div>
