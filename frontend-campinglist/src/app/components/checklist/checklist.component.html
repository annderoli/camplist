<div class="active-state fade-in">

  <!-- Botão voltar -->
  <button class="btn-back" (click)="onBackToManage()">← Editar Itens</button>

  <!-- Barra de progresso -->
  <div class="progress-bar">
    <div class="progress" [style.width.%]="progressPercent()"></div>
  </div>
  <div class="counter">{{ separatedCount() }} de {{ totalCount() }} itens separados</div>

  <!-- Card do item atual -->
  <div class="item-card current has-bg" *ngIf="currentItem() as current">
    <img src="/ford-ka.png" alt="Ford Ka" class="card-bg-image" />
    <div class="card-content-overlay">

      <h2 class="item-name">{{ current.name }}</h2>
      <p class="item-instruction">Separe este item e confirme</p>
      <button class="btn-primary ripple" (click)="onMarkOk()">
        <span class="btn-text">OK, Separado !</span>
        <span class="btn-icon">✓</span>
      </button>
    </div>
  </div>

</div>
